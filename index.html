<!DOCTYPE html>
<html>
  <head>
    <title>Deck.gl Plain Background</title>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>

    <style>
      body { margin: 0; padding: 0; }
      #container { width: 100vw; height: 100vh; background-color: #111111; }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script type="text/javascript">
    

      async function initMap() {
        const response = await fetch('data/test_data.json'); 
        const rawData = await response.json();
      
        // Keep this for the dots/tooltips
        const flattenedData = rawData.flatMap(group => 
          group.data.map(point => ({
            ...point,
            parentType: group.type,
            parentNumber: group.number
          }))
        );
      
        new deck.DeckGL({
          container: 'container',
          views: [new deck.OrthographicView({id: 'ortho'})],
          initialViewState: {
            target: [0, 0, 0], // The pixel coordinate the camera looks at
            zoom: 0               // 0 zoom means 1 unit = 1 pixel
          },  
          controller: true,
          layers: [
            // 1. THE PATH LAYER (Lines connecting the dots)
            new deck.PathLayer({
              id: 'path-layer',
              data: rawData, // Use the un-flattened original list
              coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
              getPath: d => d.data.map(p => [p.x, p.y]), // Map the nested points to [x, y] arrays
              getColor: d => d.type === 'A' ? [255, 0, 100] : [0, 200, 255],
              getWidth: 0.4,
              widthMinPixels: 0.2,
              widthMaxPixels: 0.6,
              capRounded: true,
              jointRounded: true
            }),
      
            // 2. THE SCATTERPLOT LAYER (The dots on top)
            new deck.ScatterplotLayer({
              id: 'json-layer',
              data: flattenedData,
              coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
              pickable: true,
              opacity: 1,
              getPosition: d => [d.x, d.y], 
              getFillColor: d => d.parentType === 'A' ? [255, 0, 100] : [0, 200, 255],
              getRadius: 0.001,
              radiusMinPixels: 0.00001,
              radiusMaxPixels: 0.1
            })
          ],
          getTooltip: ({object}) => object && `Type: ${object.parentType || object.type}\nID: ${object.parentNumber || object.number}`
        });
      }
      
      initMap();

    </script>
  </body>
</html>
