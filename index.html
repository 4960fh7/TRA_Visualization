    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; margin: 0; padding: 20px; background-color: #fcfcfc; }
        .container { max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        #chart-container { width: 100%; height: 90vh; background: white; border: 1px solid #ddd; overflow: hidden; position: relative; cursor: grab;}
        #chart-container:active { cursor: grabbing; }
        canvas { display: block; width: 100%; height: 100%;}
        .status-box { padding: 10px; margin-bottom: 10px; border-radius: 4px; font-weight: bold; }
        .loading { background: #e2e3e5; color: #383d41; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    
<button onclick="resetChartZoom()" style="position:fixed; top:20px; right:20px; z-index:100;">Reset View</button>

<div class="container">
    <div class="header">
        <h1>Train Diagram</h1>
        <div id="status" class="status-box loading">正在載入 JSON 班表...</div>
    </div>
    <div id="chart-container">
        <canvas id="trainChart"></canvas>

</div>

const colorPalette = {
    "自強": "green", "區間": "black", "區間快": "blue",
    "普悠瑪": "red", "太魯閣": "orange", "新自強": "purple", "莒光": "gold"
};

async function loadData() {
    const statusEl = document.getElementById('status');
    try {
        const response = await fetch('data/20260204.json');
        if (!response.ok) throw new Error(`找不到檔案 (Status: ${response.status})`);
        
        // 嘗試以 UTF-8 文字方式讀取，確認內容
        const text = await response.text();
        console.log("檔案開頭內容確認:", text.substring(0, 100)); 
        
        // 如果上面印出來的還是亂碼，代表 JSON 檔案本身存檔時編碼就錯了
        const jsonData = JSON.parse(text);
        
        const datasets = processJsonToDatasets(jsonData);
        
        if (datasets.length === 0) {
            statusEl.innerText = "JSON 解析成功，但車站名稱不匹配。請檢查 Console 報錯。";
            statusEl.className = "status-box error";
            return;
        }

        renderChart(datasets);
        statusEl.innerText = `成功繪製 ${datasets.length} 個班次`;
        statusEl.className = "status-box success";
    } catch (err) {
        statusEl.innerText = `讀取失敗: ${err.message}`;
        statusEl.className = "status-box error";
        console.error("詳細錯誤:", err);
    }
}

function processJsonToDatasets(jsonData) {
    return jsonData.map(train => {
        const dataPoints = [];
        
        if (!train.data || !Array.isArray(train.data)) return null;

        train.data.forEach(stop => {
            // 關鍵修正：去除可能的空格
            const stationName = stop.station.trim();
            const dist = stationDistances[stationName];
            
            if (dist !== undefined) {
                dataPoints.push({ x: stop.arrtime, y: dist });
                dataPoints.push({ x: stop.deptime, y: dist });
            } else {
                // 如果找不到車站，會在控制台印出錯誤，幫助你檢查是否字打錯
                console.warn(`車站名稱不匹配: "${stationName}" (車次: ${train.number})`);
            }
        });

        if (dataPoints.length === 0) return null;

        return {
            label: `${train.train} ${train.number}`,
            data: dataPoints,
            borderColor: colorPalette[train.train] || "#ccc",
            borderWidth: 1.5,
            showLine: true,
            fill: false,
            pointRadius: 0,
            spanGaps: true,
            tension: 0 
        };
    }).filter(d => d !== null);
}

function renderChart(datasets) {
    const ctx = document.getElementById('trainChart').getContext('2d');
    
    // 計算顯示範圍
    const allX = datasets.flatMap(d => d.data.map(p => p.x));
    const allY = datasets.flatMap(d => d.data.map(p => p.y));

    new Chart(ctx, {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
            animation: false,
            responsive: true,
            maintainAspectRatio: false,
            devicePixelRatio: 2,
            layout: { padding: 10 },
            scales: {
                x: {
                    type: 'linear',
                    min: Math.min(...allX) - 20, // 根據數據自動調整起始時間
                    max: Math.max(...allX) + 20,
                    ticks: {
                        // 強制每 10 分鐘產生一個刻度，以便畫線
                        stepSize: 10, 
                        autoSkip: false,
                        callback: function(value) {
                            // 只在整點時顯示文字標籤（例如 08:00）
                            if (value % 60 === 0) {
                                const h = Math.floor(value / 60).toString().padStart(2, '0');
                                return `${h}:00`;
                            }
                            return ""; // 非整點不顯示文字，避免擁擠
                        }
                    },
                    grid: {
                        display: true,
                        drawOnChartArea: true,
                        // 設定垂直線顏色
                        color: (context) => {
                            const v = context.tick.value;
                            if (v % 60 === 0) return 'rgba(0, 0, 0, 0.3)'; // 整點：較深的灰色
                            if (v % 10 === 0) return 'rgba(0, 0, 0, 0.05)'; // 每10分：極淺的灰色
                            return 'transparent';
                        },
                        // 設定垂直線粗細
                        lineWidth: (context) => {
                            const v = context.tick.value;
                            return (v % 60 === 0) ? 2 : 1; // 整點用 2px，10分用 1px
                        }
                    }
                },
                y: {
                    reverse: true,
                    min: Math.min(...allY) - 5,
                    max: Math.max(...allY) + 5,
                    afterBuildTicks: (axis) => {
                        // 【關鍵】強制將所有定義過的車站距離加入刻度中
                        const allDistances = Object.values(stationDistances);
                        axis.ticks = allDistances.map(v => ({ value: v }));
                    },
                    ticks: {
                        autoSkip: false, // 【重要】不要自動跳過標籤
                        font: {
                            size: 10 // 如果車站太擠，可以縮小字體
                        },
                        callback: (v) => {
                            // 找出對應座標的車站名稱
                            const entry = Object.entries(stationDistances).find(([name, dist]) => Math.abs(dist - v) < 0.1);
                            return entry ? entry[0] : "";
                        }
                    },
                    grid: {
                        display: true,
                        drawOnChartArea: true,
                        color: (context) => {
                            // 檢查目前的刻度值是否為我們定義的車站
                            const v = context.tick.value;
                            const isStation = Object.values(stationDistances).some(dist => Math.abs(dist - v) < 0.1);
                            return isStation ? 'rgba(0, 0, 0, 0.15)' : 'transparent';
                        },
                        lineWidth: 1
                    }
                }
            },
            plugins: {
                legend: { display: false },
                zoom: {
                    pan: {
                        enabled: true,
                        mode: 'xy', // Allows dragging in all directions
                        // Optional: require a key to pan, or leave as null to pan with just a mouse click
                        modifierKey: null, 
                        threshold: 0, // Minimum pixels to move before panning starts
                    },
                    zoom: {
                        wheel: {
                            enabled: true,
                            // 【KEY CHANGE】: Zoom only triggers when Ctrl is held
                            modifierKey: 'ctrl', 
                            speed: 0.1, 
                        },
                        // pinch: {
                        //     enabled: true
                        // },
                        // 【KEY CHANGE】: Zoom both axes when Ctrl is held
                        mode: 'xy', 
                    }
                },
                tooltip: {
                    callbacks: {
                        label: (ctx) => {
                            const h = Math.floor(ctx.parsed.x / 60);
                            const m = (ctx.parsed.x % 60).toString().padStart(2, '0');
                            return `${ctx.dataset.label}: ${h}:${m}`;
                        }
                    }
                }
            }
        }
    });
    ctx.canvas.addEventListener('wheel', (e) => {
        if (e.ctrlKey) return; // Allow the plugin to handle CTRL + Zoom
        
        e.preventDefault(); // Prevent page scroll
        
        const speed = 0.5; // Adjust scroll sensitivity
        
        if (e.shiftKey) {
            // Horizontal scroll (X-axis)
            chart.pan({x: -e.deltaY * speed}, undefined, 'default');
        } else {
            // Vertical scroll (Y-axis)
            chart.pan({y: -e.deltaY * speed}, undefined, 'default');
        }
    }, { passive: false });
}

const chartCanvas = document.getElementById('trainChart');

chartCanvas.addEventListener('mousedown', () => chartCanvas.style.cursor = 'grabbing');
chartCanvas.addEventListener('mouseup', () => chartCanvas.style.cursor = 'grab');
chartCanvas.addEventListener('mouseover', () => chartCanvas.style.cursor = 'grab');

function resetChartZoom() {
    // 'trainChart' is the ID of your canvas; Chart.getChart gets the instance
    const chart = Chart.getChart("trainChart");
    if (chart) {
        chart.resetZoom();
    }
}

// 執行載入
loadData();
</script>
</body>
