<!DOCTYPE html>
<html>
  <head>
    <title>Deck.gl on GitHub Pages</title>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
      body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; }
      #container { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script type="text/javascript">
      // 2. Initialize deck.gl
      new deck.DeckGL({
        container: 'container',
        // Use a free base map style (Carto is great for this)
        mapStyle: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
        initialViewState: {
          longitude: -122.45,
          latitude: 37.8,
          zoom: 12,
          pitch: 30
        },
        controller: true,
        layers: [
          new deck.ScatterplotLayer({
            id: 'my-points',
            data: [{position: [-122.45, 37.8], size: 100}],
            getPosition: d => d.position,
            getFillColor: [255, 0, 0],
            getRadius: d => d.size,
            pickable: true
          })
        ]
      });
    </script>
  </body>
</html>
