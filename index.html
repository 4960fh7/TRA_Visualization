<!DOCTYPE html>
<html>
    <head>
        <title>Deck.gl Map with Sidebar</title>
        <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
        <style>
            body { margin: 0; padding: 0; display: flex; background-color: #111; font-family: sans-serif; }
            #container { width: 75vw; height: 100vh; }
            #sidebar { 
                width: 25vw; height: 100vh; background-color: #222; color: white; 
                padding: 20px; box-sizing: border-box; border-left: 1px solid #444;
            }
            .placeholder { color: #666; font-style: italic; }
            h2 { border-bottom: 1px solid #444; padding-bottom: 10px; }
        </style>
    </head>
    <body>
        <div id="container"></div>
        <div id="sidebar">
            <h2>Line Details</h2>
            <div id="info-content">
                <p class="placeholder">Click a line to see details</p>
            </div>
        </div>

        <script type="text/javascript">
            let selectedLine = null;

            async function initMap() {
                const response = await fetch('data/test_data.json'); 
                const rawData = await response.json();
                const infoBox = document.getElementById('info-content');

                const deckInstance = new deck.DeckGL({
                    container: 'container',
                    views: [new deck.OrthographicView({id: 'ortho'})],
                    initialViewState: { target: [0, 0, 0], zoom: 6 },
                    controller: true,
                    pickingRadius: 10,
                    
                    onViewStateChange: ({viewState}) => { deckInstance.setProps({viewState}); },

                    onClick: (info) => {
                        if (info.object && info.layer.id === 'main-path-layer') {
                            selectedLine = info.object;
                            infoBox.innerHTML = `
                                <p><strong>Type:</strong> ${selectedLine.type}</p>
                                <p><strong>Number:</strong> ${selectedLine.number}</p>
                            `;
                        } else {
                            // Reset if clicking background
                            selectedLine = null;
                            infoBox.innerHTML = `<p class="placeholder">Click a line to see details</p>`;
                        }
                        renderLayers();
                    }
                });

                function renderLayers() {
                    const layers = [
                        new deck.PathLayer({
                            id: 'main-path-layer',
                            data: rawData,
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            pickable: true,
                            autoHighlight: true,
                            highlightColor: [255, 255, 255, 150],
                            getPath: d => d.data.map(p => [p.x, p.y]),
                            getColor: d => d.type === 'A' ? [200, 0, 80] : [0, 160, 200],
                            getWidth: 1.5,
                            widthMaxPixels: 2,
                            widthMinPixels: 1
                        }),

                        new deck.PathLayer({
                            id: 'selection-layer',
                            // This array is either empty or contains exactly one item
                            data: selectedLine ? [selectedLine] : [], 
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            pickable: false,
                            getPath: d => d.data.map(p => [p.x, p.y]),
                            getColor: [255, 255, 0], // Yellow highlight
                            getWidth: 2.5,
                            widthMaxPixels: 3,
                            widthMinPixels: 2
                        }),

                        new deck.ScatterplotLayer({
                            id: 'json-layer',
                            data: rawData.flatMap(g => g.data.map(p => ({...p, type: g.type}))),
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => [d.x, d.y], 
                            getFillColor: [200, 200, 200],
                            getRadius: 0.0001,
                            radiusMinPixels: 0.00001,
                            radiusMaxPixels: 0.001
                        })
                    ];

                    deckInstance.setProps({layers});
                }

                renderLayers();
            }
            
            initMap();
        </script>
    </body>
</html>
